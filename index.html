<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>ATC SIM</title>
<style>
:root{--bg:#07101f;--panel:#121b2f;--panel2:#18243b;--text:#e8eefc;--muted:#aebbd5;--line:#415777;--arr:#ffd166;--dep:#4DA3FF;--danger:#3a1725}
*{box-sizing:border-box}html,body{width:100%;height:100%;overscroll-behavior:none;touch-action:none}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
header{height:48px;padding:6px 8px;background:#0e1728;border-bottom:1px solid #25334f;display:flex;gap:6px;align-items:center;flex-wrap:nowrap;white-space:nowrap;overflow-x:auto;position:sticky;top:0;z-index:5}
h1{font-size:16px;margin:0 6px 0 0}button,select,input{border:1px solid #344462;background:#101a2d;color:var(--text);border-radius:8px;padding:5px 7px;font-size:12px}button{cursor:pointer;background:#1c2b47}button:hover{background:#25385d}button:disabled{opacity:.45;cursor:not-allowed}.runPauseBtn.running{background:#24543a;border-color:#52a36f}.runPauseBtn.paused{background:#5b3c13;border-color:#c58b2d}.statusIndicator{font-variant-numeric:tabular-nums;border:1px solid #344462;border-radius:8px;padding:5px 8px;font-size:12px;font-weight:700;color:#fff;min-width:76px;text-align:center}.statusIndicator.running{background:#24543a;border-color:#52a36f}.statusIndicator.paused{background:#5b3c13;border-color:#c58b2d}.radarZoomControls{position:absolute;right:10px;top:10px;z-index:8;display:flex;flex-direction:column;gap:6px}.radarZoomControls .miniBtn{background:rgba(28,43,71,.88);backdrop-filter:blur(3px);width:34px;height:34px;font-size:20px;border-radius:10px}label{font-size:12px;color:var(--muted);display:flex;gap:4px;align-items:center}.miniBtn{width:28px;height:28px;padding:0;font-size:17px}.speedValue{min-width:42px;text-align:center;color:#fff}.runtimeClock{font-variant-numeric:tabular-nums;border:1px solid #344462;background:#101a2d;border-radius:8px;padding:5px 8px;font-size:12px;font-weight:700;color:#fff;min-width:70px;text-align:center}.depHeadingControl input{width:56px!important}.autoSpeedControl{gap:5px}.autoSpeedControl .speedValue{min-width:42px}.qtyRadarControl input{width:48px!important}.scenarioControl select{min-width:90px;max-width:110px}#runwaySelect{min-width:58px;max-width:64px}.control select{min-width:110px;max-width:145px}
main{height:calc(100vh - 48px);display:grid;grid-template-columns:minmax(0,1fr) 285px;gap:6px;padding:6px}#scopeWrap{position:relative;border:1px solid #25334f;border-radius:14px;overflow:hidden;background:#07101f;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}canvas{display:block;width:100%;height:100%;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;cursor:default}aside{display:flex;flex-direction:column;gap:6px;min-width:0}.card{background:var(--panel);border:1px solid #25334f;border-radius:12px;padding:8px}.card h2{font-size:14px;margin:0 0 7px}.small,.hint{font-size:11px;line-height:1.35;color:var(--muted)}#calls{font-size:12px;line-height:1.25;max-height:145px;overflow:auto;white-space:pre-wrap;color:#d8e2f5}.traffic{font-size:12px;line-height:1.28;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
aside{display:flex;flex-direction:column;gap:6px;min-width:0;height:100%}
aside .card:last-child{display:flex;flex-direction:column;flex:1;min-height:0}
aside .card:last-child .traffic{flex:1;min-height:0}.aircraftRow{border-bottom:1px solid #25334f;padding:7px 5px;cursor:pointer;border-radius:8px}.aircraftRow:hover{background:#18243b}.aircraftRow b{font-size:13px}.intentions{margin-top:3px;color:#d8e2f5;white-space:pre-line}.popup{position:absolute;display:none;z-index:10;background:#121b2f;border:1px solid #647899;border-radius:10px;padding:5px;box-shadow:0 8px 24px rgba(0,0,0,.45);width:156px;max-height:calc(100% - 12px);overflow:auto}.popup b{display:block;margin-bottom:3px;font-size:12px}.popup label{font-size:10px;margin:1px 0}.popup input{width:100%;padding:3px 5px;font-size:11px;margin-top:1px}.popup button{width:100%;margin:1px 0;text-align:center;padding:4px 5px;font-size:11px;border-radius:7px}.popup .popupGrid{display:grid;grid-template-columns:1fr 1fr;gap:2px}.danger{background:var(--danger);border-color:#7d3650}.autoOn{background:#24543a!important;border-color:#52a36f!important;color:#fff!important}
#selectedPanel input,#selectedPanel select{width:100%;margin:4px 0 8px}.editButtons{display:flex;gap:5px;flex-wrap:wrap}.editButtons button{flex:1;min-width:70px}

/* Fixed sidebar layout: the aircraft list scrolls instead of stretching the radar/page. */
html, body { height:100%; max-height:100%; overflow:hidden; }
main { height:calc(100vh - 48px); min-height:0; overflow:hidden; }
#scopeWrap { min-height:0; height:100%; }
aside { height:100%; max-height:100%; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
aside .card { flex:0 0 auto; min-height:0; }
aside .card:last-child { flex:1 1 auto; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
aside .card:last-child h2 { flex:0 0 auto; }
#trafficList { flex:1 1 auto; min-height:0; max-height:none !important; overflow-y:auto !important; overflow-x:hidden; padding-right:2px; }


/* Three-column ATC SIM layout:
   left = fixed aircraft list with its own scrollbar,
   centre = radar,
   right = intentions + selected aircraft. */
html, body { height:100%; max-height:100%; overflow:hidden; }
main {
  height:calc(100vh - 48px) !important;
  min-height:0 !important;
  overflow:hidden !important;
  display:grid !important;
  grid-template-columns:240px minmax(0,1fr) 285px !important;
  gap:6px !important;
  padding:6px !important;
}
#scopeWrap {
  min-width:0 !important;
  min-height:0 !important;
  height:100% !important;
}
.leftPanel,
.rightPanel {
  height:100% !important;
  max-height:100% !important;
  min-height:0 !important;
  overflow:hidden !important;
  display:flex !important;
  flex-direction:column !important;
  gap:6px !important;
}
.leftPanel .aircraftCard {
  flex:1 1 auto !important;
  min-height:0 !important;
  overflow:hidden !important;
  display:flex !important;
  flex-direction:column !important;
}
.leftPanel .aircraftCard h2 {
  flex:0 0 auto !important;
}
#trafficList {
  flex:1 1 auto !important;
  min-height:0 !important;
  max-height:none !important;
  overflow-y:auto !important;
  overflow-x:hidden !important;
  padding-right:2px;
}
.rightPanel .intentionsCard,
.rightPanel .selectedCard {
  flex:0 0 auto !important;
}
#calls {
  max-height:42vh !important;
  overflow-y:auto !important;
}
@media (max-width: 900px) {
  main {
    grid-template-columns:190px minmax(0,1fr) 235px !important;
  }
}

.syncStatus{font-size:11px;color:var(--muted);border:1px solid #344462;background:#101a2d;border-radius:8px;padding:5px 8px;min-width:90px;text-align:center}
.syncStatus.live{color:#9ff0b3;border-color:#52a36f}
.syncStatus.watch{color:#ffd166;border-color:#a98532}
#syncSessionInput{width:100%;text-transform:uppercase}
.syncCard{margin-top:auto;display:flex;flex-direction:column;gap:6px}
.syncCard .syncRow{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.syncCard .syncRow button{width:100%}
.syncCard .syncStatus{width:100%;display:block}
body.traineeMode header button, body.traineeMode header select, body.traineeMode header input{opacity:.48;pointer-events:none}
body.traineeMode #zoomMinus, body.traineeMode #zoomPlus{opacity:1!important;pointer-events:auto!important}
body.traineeMode #zoomValue{opacity:1!important}
body.traineeMode #hostSessionBtn, body.traineeMode #joinSessionBtn, body.traineeMode #copyTraineeLinkBtn, body.traineeMode .syncSessionLabel{display:none!important}
body.traineeMode #selectedPanel button, body.traineeMode #selectedPanel select, body.traineeMode #selectedPanel input{display:none}
body.traineeMode canvas{cursor:default}

/* Two-row control bar */
header{height:84px!important;display:flex!important;flex-direction:column!important;align-items:stretch!important;gap:5px!important;overflow:hidden!important;padding:5px 8px!important}
.headerRow{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;white-space:nowrap;overflow-x:auto;min-height:32px}
.headerRow h1{flex:0 0 auto}
main{height:calc(100vh - 84px)!important}
.headerRow.bottomRow{border-top:1px solid #25334f;padding-top:4px}
.radialControl input,.heightControl input,.spawnAtControl input{width:58px!important}
@media (max-width:900px){header{height:88px!important}main{height:calc(100vh - 88px)!important}}


/* Mobile friendly layout: radar first, panels underneath, controls remain scrollable. */
.mobileTabBar{display:none}
@media (max-width: 760px), (pointer: coarse) and (max-width: 900px){
  html, body{
    height:auto!important;
    min-height:100dvh!important;
    max-height:none!important;
    overflow:auto!important;
    touch-action:auto!important;
    -webkit-overflow-scrolling:touch;
  }
  body{overflow-x:hidden!important}
  header{
    position:sticky!important;
    top:0!important;
    height:auto!important;
    max-height:42dvh!important;
    overflow-y:auto!important;
    padding:6px!important;
  }
  .headerRow{
    overflow-x:auto!important;
    overflow-y:hidden!important;
    min-height:42px!important;
    padding-bottom:3px!important;
  }
  button,select,input{
    min-height:34px;
    font-size:13px;
  }
  .miniBtn{width:34px;height:34px;font-size:18px}
  .speedValue,.runtimeClock{min-height:34px;display:inline-flex;align-items:center;justify-content:center}
  main{
    display:flex!important;
    flex-direction:column!important;
    height:auto!important;
    min-height:calc(100dvh - 92px)!important;
    overflow:visible!important;
    padding:6px!important;
    gap:6px!important;
  }
  #scopeWrap{
    order:1!important;
    height:58dvh!important;
    min-height:360px!important;
    max-height:70dvh!important;
    width:100%!important;
    flex:0 0 auto!important;
    touch-action:none!important;
  }
  .leftPanel{order:2!important}
  .rightPanel{order:3!important}
  .leftPanel,.rightPanel{
    width:100%!important;
    height:auto!important;
    max-height:none!important;
    overflow:visible!important;
    display:flex!important;
    flex-direction:column!important;
  }
  .leftPanel .aircraftCard,
  .rightPanel .selectedCard,
  .rightPanel .intentionsCard,
  .rightPanel .syncCard{
    flex:0 0 auto!important;
    height:auto!important;
    max-height:none!important;
    overflow:visible!important;
  }
  #trafficList{
    max-height:34dvh!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch;
  }
  #calls{
    max-height:28dvh!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch;
  }
  #selectedPanel{max-height:none!important;overflow:visible!important}
  .syncCard{margin-top:0!important}
  .popup{
    width:min(92vw,260px)!important;
    max-height:70dvh!important;
  }
}
@media (max-width: 520px){
  h1{font-size:14px}
  .headerRow{gap:5px!important}
  button,select,input{font-size:12px;padding:6px 8px}
  .control select{min-width:104px;max-width:130px}
  #scopeWrap{height:54dvh!important;min-height:300px!important}
  main{padding:5px!important}
  .card{padding:7px}
}
@media (orientation: landscape) and (max-height: 520px){
  header{max-height:36dvh!important}
  #scopeWrap{height:70dvh!important;min-height:260px!important}
}


/* Final responsive/mobile app layout */
.mobileTabBar{display:none}
@media (max-width: 760px), (pointer: coarse) and (max-width: 900px){
  :root{--mobileTabs:54px}
  html,body{height:100dvh;max-height:100dvh;overflow:hidden}
  body{position:fixed;inset:0;width:100%;touch-action:manipulation}
  header{height:auto!important;max-height:38dvh!important;overflow-y:auto!important;overflow-x:hidden!important;padding:5px!important;display:flex!important;flex-direction:column!important;gap:5px!important;position:relative!important}
  .headerRow{display:flex!important;flex-wrap:wrap!important;gap:5px!important;width:100%;align-items:center!important}
  .topRow h1{flex:0 0 auto;margin-right:4px}
  .topRow #runtimeClock{margin-left:auto}
  button,select,input{min-height:34px;font-size:13px;padding:6px 8px}
  .miniBtn{width:34px;height:34px;font-size:18px;padding:0}
  .speedValue,.runtimeClock{min-height:34px;display:inline-flex;align-items:center;justify-content:center}
  .control{font-size:11px;gap:4px}
  .control select{min-width:106px;max-width:132px}
  .radialControl input,.heightControl input,.spawnAtControl input{width:68px!important}
  main{height:calc(100dvh - var(--mobileHeader, 150px))!important;min-height:0!important;overflow:hidden!important;display:block!important;padding:5px 5px calc(var(--mobileTabs) + 5px)!important}
  #scopeWrap{height:100%!important;min-height:0!important;width:100%!important;border-radius:12px!important}
  .leftPanel,.rightPanel{position:absolute!important;left:5px!important;right:5px!important;bottom:calc(var(--mobileTabs) + 6px)!important;top:auto!important;height:min(48dvh,420px)!important;width:auto!important;z-index:20!important;display:none!important;overflow:hidden!important;gap:5px!important;background:rgba(7,16,31,.94);border-radius:14px}
  body.mobile-panel-aircraft .leftPanel{display:flex!important}
  body.mobile-panel-selected .rightPanel, body.mobile-panel-intentions .rightPanel, body.mobile-panel-session .rightPanel{display:flex!important}
  body.mobile-panel-selected .rightPanel .intentionsCard, body.mobile-panel-selected .rightPanel .syncCard{display:none!important}
  body.mobile-panel-intentions .rightPanel .selectedCard, body.mobile-panel-intentions .rightPanel .syncCard{display:none!important}
  body.mobile-panel-session .rightPanel .selectedCard, body.mobile-panel-session .rightPanel .intentionsCard{display:none!important}
  .leftPanel .aircraftCard,.rightPanel .selectedCard,.rightPanel .intentionsCard,.rightPanel .syncCard{height:100%!important;max-height:100%!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;flex:1 1 auto!important}
  #trafficList,#calls,#selectedPanel{overflow-y:auto!important;-webkit-overflow-scrolling:touch;max-height:none!important;min-height:0!important;flex:1 1 auto!important}
  .mobileTabBar{position:fixed;left:0;right:0;bottom:0;height:var(--mobileTabs);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:5px calc(5px + env(safe-area-inset-right)) calc(5px + env(safe-area-inset-bottom)) calc(5px + env(safe-area-inset-left));background:#0e1728;border-top:1px solid #25334f;z-index:50}
  .mobileTabBar button{min-height:40px;border-radius:10px;font-size:11px;padding:4px;background:#101a2d}
  .mobileTabBar button.active{background:#2f4772;border-color:#7e9bcc;color:#fff;font-weight:700}
  .popup{width:min(92vw,270px)!important;max-height:70dvh!important}
}
@media (max-width: 520px){
  h1{font-size:14px}
  button,select,input{font-size:12px;padding:6px 7px}
  .control select{min-width:102px;max-width:122px}
  .topRow .control{max-width:100%}
  .bottomRow{max-height:22dvh;overflow-y:auto}
}
@media (orientation: landscape) and (max-height: 520px){
  header{max-height:34dvh!important}
  main{padding-bottom:46px!important}
  .mobileTabBar{height:46px}
  .leftPanel,.rightPanel{height:min(58dvh,320px)!important;bottom:50px!important}
}


/* Phone view chooser: allows a phone to use either the mobile tab layout or the full desktop layout. */
.viewModeBtn{display:none;background:#27456f;border-color:#6f8fbd;color:#fff;font-weight:700}
@media (max-width: 760px), (pointer: coarse) and (max-width: 900px){
  .viewModeBtn{display:inline-flex;align-items:center;justify-content:center}
  body.traineeMode #viewModeBtn{opacity:1!important;pointer-events:auto!important;display:inline-flex!important}
  body.forceDesktop{position:static!important;inset:auto!important;width:max(1024px,100vw)!important;min-width:1024px!important;overflow:auto!important;overflow-x:auto!important;overflow-y:auto!important;touch-action:auto!important}
  body.forceDesktop header{position:sticky!important;top:0!important;height:84px!important;max-height:none!important;display:flex!important;flex-direction:column!important;align-items:stretch!important;gap:5px!important;overflow:hidden!important;padding:5px 8px!important;width:100%!important}
  body.forceDesktop .headerRow{display:flex!important;flex-wrap:nowrap!important;overflow-x:auto!important;overflow-y:hidden!important;min-height:32px!important;padding-bottom:0!important;gap:6px!important}
  body.forceDesktop main{height:calc(100vh - 84px)!important;min-height:0!important;overflow:hidden!important;display:grid!important;grid-template-columns:240px minmax(0,1fr) 285px!important;gap:6px!important;padding:6px!important;width:100%!important}
  body.forceDesktop #scopeWrap{order:initial!important;height:100%!important;min-height:0!important;max-height:none!important;width:100%!important;border-radius:14px!important}
  body.forceDesktop .leftPanel,body.forceDesktop .rightPanel{position:static!important;left:auto!important;right:auto!important;bottom:auto!important;top:auto!important;order:initial!important;height:100%!important;max-height:100%!important;width:auto!important;display:flex!important;overflow:hidden!important;background:transparent!important;border-radius:0!important;z-index:auto!important}
  body.forceDesktop .leftPanel .aircraftCard{height:100%!important;max-height:100%!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;flex:1 1 auto!important}
  body.forceDesktop .rightPanel .selectedCard,body.forceDesktop .rightPanel .intentionsCard{height:auto!important;max-height:none!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;flex:0 0 auto!important}
  body.forceDesktop .rightPanel .syncCard{height:auto!important;max-height:none!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;flex:0 0 auto!important;margin-top:auto!important}
  body.forceDesktop #trafficList{flex:1 1 auto!important;min-height:0!important;max-height:none!important;overflow-y:auto!important}
  body.forceDesktop #calls{max-height:42vh!important;overflow-y:auto!important}
  body.forceDesktop #selectedPanel{overflow:visible!important;max-height:none!important}
  body.forceDesktop .mobileTabBar{display:none!important}
}

</style>
</head>
<body>
<header>
  <div class="headerRow topRow">
    <h1>ATC SIM</h1>
    <button id="viewModeBtn" class="viewModeBtn" type="button">Use Full View</button>
    <button id="pauseBtn" class="runPauseBtn running">Pause</button><button id="newScenarioBtn">New Scenario</button><button id="stepBackBtn">−10 sec</button><button id="fastForwardBtn">+10 sec</button>
    <label class="control">Run speed <button class="miniBtn" id="speedMinus">−</button><span class="speedValue" id="speedValue">1.50×</span><button class="miniBtn" id="speedPlus">+</button></label>
    <span id="runtimeClock" class="runtimeClock">00:00:00</span><span id="runStatus" class="statusIndicator running">Running</span>
    <label>Runway <select id="runwaySelect"><option value="90">09</option><option value="270">27</option></select></label>
    <button id="autoGenerateBtn" type="button">Auto Off</button><label class="control scenarioControl">Scenario <select id="autoScenarioSelect" disabled><option value="normal" title="Mostly 3 NM spacing with occasional conflicts">Normal</option><option value="busy" title="Average spacing around 2 NM">Busy</option><option value="training" title="Deliberate conflicts every few minutes">Training</option><option value="instructor" title="Random mix with unusual situations">Instructor</option><option value="chaos" title="Anything can happen">Chaos</option></select></label>
  </div>
  <div class="headerRow bottomRow">
    <label class="control">Aircraft <select id="aircraftTypeSelect">
<option value="B350">B350 / HDSN</option><option value="Hawk">Hawk / PHNX</option><option value="F18">F18 / HRTG</option><option value="PC21">PC21 / ALDN</option>
<option value="BE79">BE79 / CLE</option><option value="C206">C206 / WGP</option><option value="PA31">PA31 / OCF</option><option value="D328">D328 / RSCU328</option><option value="C182">C182 / KOJ/SVA</option><option value="BE20">BE20 / MWU</option><option value="C208">C208 / HAM</option><option value="PA34">PA34 / KMN</option>
</select></label>
    <label class="control radialControl">Radial <input id="arrivalRadialInput" type="number" min="0" max="359" value="270"></label>
    <label class="control heightControl">Height <input id="manualHeightInput" type="number" min="0" max="11000" step="100" value="3500"> FT</label>
    <button id="depHeadingBtn" type="button">Depart heading</button>
    <label class="control spawnAtControl">Spawn at <input id="arrivalDistanceInput" type="number" min="1" max="30" step="1" value="10"> NM</label>
    <button id="arrivalRadialBtn" type="button">New Arrival</button>
    <button id="spawnDepartureBtn">Random Departure</button><button id="randomArrivalBtn">Random Arrival</button>
  </div>
</header>
<main>
<aside id="leftPanel" class="leftPanel">
  <div class="card aircraftCard"><h2>Aircraft</h2><div class="traffic" id="trafficList"></div></div>
</aside>
<section id="scopeWrap"><canvas id="scope"></canvas><div class="radarZoomControls" aria-label="Radar zoom"><button class="miniBtn" id="zoomPlus" type="button">+</button><button class="miniBtn" id="zoomMinus" type="button">−</button></div><div id="aircraftPopup" class="popup"></div></section>
<aside id="rightPanel" class="rightPanel">
  <div class="card selectedCard"><h2>Selected aircraft</h2><div id="selectedPanel" class="small">Click an aircraft to select it. Double-click for quick actions. Drag its callsign if labels overlap.</div></div>
  <div class="card intentionsCard"><h2>Aircraft intentions</h2><div id="calls">Start a scenario, then add traffic.</div></div>
  <div class="card syncCard"><h2>Shared session</h2><span class="syncStatus" id="syncStatus">Local</span><label class="syncSessionLabel">Session code<input id="syncSessionInput" placeholder="ABC123" maxlength="8"></label><div class="syncRow"><button id="hostSessionBtn" class="syncBtn" type="button">Host</button><button id="joinSessionBtn" class="syncBtn" type="button">Join</button></div><div class="syncRow"><button id="copyTraineeLinkBtn" class="syncBtn" type="button">Copy Share Link</button><button id="leaveSessionBtn" class="syncBtn" type="button">Leave</button></div></div>
</aside>
<nav id="mobileTabBar" class="mobileTabBar" aria-label="Mobile panels">
  <button type="button" data-panel="radar" class="active">Radar</button>
  <button type="button" data-panel="aircraft">Aircraft</button>
  <button type="button" data-panel="selected">Selected</button>
  <button type="button" data-panel="intentions">Intentions</button>
  <button type="button" data-panel="session">Share</button>
</nav>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

function conflictRadialForAircraft(ac){

function aircraftAtPoint(p){let near=null,nd=Infinity;aircraft.forEach(ac=>{let d=dist(p,ac.pos);if(d<nd){near=ac;nd=d}});return near&&nd<=22?near:null}
function canvasPoint(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
canvas.addEventListener('click',e=>{if(performance.now()<suppressClickUntil){e.preventDefault();e.stopPropagation();return}const p=canvasPoint(e);const near=aircraftAtPoint(p);if(near){selectedAircraftId=near.id;hidePopup();renderList()}else{selectedAircraftId=null;hidePopup();renderList()}e.preventDefault()});
canvas.addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();const p=canvasPoint(e);const near=aircraftAtPoint(p);if(near){selectedAircraftId=near.id;if(syncMode==='trainee'){hidePopup();renderList()}else showPopup(near,e.clientX,e.clientY)}});
canvas.addEventListener('pointerdown',e=>{const p=canvasPoint(e);for(let i=aircraft.length-1;i>=0;i--){const ac=aircraft[i],box=labelHitBox(ac);if(pointInBox(p,box)){selectedAircraftId=ac.id;const lp=labelPosition(ac);labelDrag={id:ac.id,dx:p.x-lp.x,dy:p.y-lp.y,pointerId:e.pointerId,moved:false};hidePopup();renderSelectedPanel();canvas.style.cursor='grabbing';try{canvas.setPointerCapture(e.pointerId)}catch(_){}e.preventDefault();e.stopPropagation();return}}},{passive:false});
function handleLabelMove(e){if(!labelDrag||labelDrag.pointerId!==e.pointerId)return;const ac=aircraft.find(a=>a.id===labelDrag.id);if(!ac){labelDrag=null;canvas.style.cursor='default';return}const p=canvasPoint(e);ac.labelOffset={x:p.x-labelDrag.dx-ac.pos.x,y:p.y-labelDrag.dy-ac.pos.y};if(syncMode==='trainee')traineeLabelOffsets[ac.id]=ac.labelOffset;labelDrag.moved=true;suppressClickUntil=performance.now()+350;e.preventDefault();e.stopPropagation()}
canvas.addEventListener('pointermove',handleLabelMove,{passive:false});window.addEventListener('pointermove',handleLabelMove,{passive:false});
function endLabelDrag(e){if(labelDrag&&(!e||labelDrag.pointerId===e.pointerId)){try{canvas.releasePointerCapture(labelDrag.pointerId)}catch(_){}if(labelDrag.moved)suppressClickUntil=performance.now()+500;labelDrag=null;canvas.style.cursor='default';if(e){e.preventDefault();e.stopPropagation()}}}
canvas.addEventListener('pointerup',endLabelDrag,{passive:false});canvas.addEventListener('pointercancel',endLabelDrag,{passive:false});window.addEventListener('pointerup',endLabelDrag,{passive:false});window.addEventListener('pointercancel',endLabelDrag,{passive:false});
canvas.addEventListener('wheel',e=>{if(labelDrag){e.preventDefault();e.stopPropagation()}},{passive:false});
canvas.addEventListener('dragstart',e=>{e.preventDefault();return false});canvas.addEventListener('selectstart',e=>{e.preventDefault();return false});
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});document.addEventListener('gestureend',e=>e.preventDefault(),{passive:false});document.addEventListener('touchmove',e=>{if(e.target===canvas||scopeWrap.contains(e.target))e.preventDefault()},{passive:false});

function updateAutoButton(){
  const btn=document.getElementById('autoGenerateBtn');
  if(!btn)return;
  btn.textContent=autoGenerate?'Auto Gen On':'Auto Gen Off';
  btn.classList.toggle('autoOn',autoGenerate);
  const sc=document.getElementById('autoScenarioSelect');
  if(sc){sc.value=autoScenario;sc.disabled=!autoGenerate;}
}
function toggleAutoGenerate(){
  autoGenerate=!autoGenerate;
  autoScenario=autoScenarioMode();
  autoNext=2;
  updateAutoButton();
  log(autoGenerate?`Auto generation on. Scenario ${scenarioProfile().label}.`:'Auto generation off.');
}
function runAutoGenerate(dt){
  if(!autoGenerate||!running)return;
  autoScenario=autoScenarioMode();
  autoNext-=dt;
  if(autoNext<=0){
    spawnAutoTraffic();
    autoNext=nextAutoDelay();
  }
}

function firebaseReady(){return typeof firebase!=='undefined'&&firebaseConfig&&firebaseConfig.apiKey&&!firebaseConfig.apiKey.startsWith('PASTE_')&&firebaseConfig.databaseURL&&!firebaseConfig.databaseURL.includes('PASTE_')}
function updateTransportButtons(){const btn=document.getElementById('pauseBtn'),status=document.getElementById('runStatus'),back=document.getElementById('stepBackBtn'),ff=document.getElementById('fastForwardBtn');if(btn){btn.textContent=running?'Pause':'Play';btn.classList.toggle('running',running);btn.classList.toggle('paused',!running)}if(status){status.textContent=running?'● Running':'● Paused';status.classList.toggle('running',running);status.classList.toggle('paused',!running)}if(back)back.disabled=running;if(ff)ff.disabled=running}
function updateSyncStatus(text,cls=''){const el=document.getElementById('syncStatus');if(!el)return;el.textContent=text;el.className='syncStatus '+cls;document.body.classList.toggle('traineeMode',syncMode==='trainee');updateTransportButtons()}
function ensureFirebase(){if(!firebaseReady()){alert('Firebase is not configured yet. Open this HTML in a text editor and replace the firebaseConfig placeholder values first.');return false}if(!firebaseApp){firebaseApp=firebase.initializeApp(firebaseConfig);firebaseDb=firebase.database()}return true}
function makeSessionId(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function cleanSessionId(v){return String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8)}
function pointToNet(pt){
  // Store points in runway/world units instead of screen pixels so each user can zoom independently.
  if(!pt||!Number.isFinite(pt.x)||!Number.isFinite(pt.y)||!canvas.width||!canvas.height)return pt;
  const c=centre(),s=scale()||1;
  return{x:(pt.x-c.x)/s,y:(pt.y-c.y)/s};
}
function pointFromNet(pt){
  if(!pt||!Number.isFinite(pt.x)||!Number.isFinite(pt.y)||!canvas.width||!canvas.height)return pt;
  const c=centre(),s=scale()||1;
  return{x:c.x+pt.x*s,y:c.y+pt.y*s};
}
function aircraftToNet(ac){const copy=JSON.parse(JSON.stringify(ac));copy.pos=pointToNet(copy.pos);if(Array.isArray(copy.route))copy.route=copy.route.map(pointToNet);if(copy.airbornePoint)copy.airbornePoint=pointToNet(copy.airbornePoint);if(copy.turnPoint)copy.turnPoint=pointToNet(copy.turnPoint);return copy}
function aircraftFromNet(ac){const copy=JSON.parse(JSON.stringify(ac));copy.pos=pointFromNet(copy.pos);if(Array.isArray(copy.route))copy.route=copy.route.map(pointFromNet);if(copy.airbornePoint)copy.airbornePoint=pointFromNet(copy.airbornePoint);if(copy.turnPoint)copy.turnPoint=pointFromNet(copy.turnPoint);return copy}
function currentNetState(){return{aircraft:aircraft.map(aircraftToNet),running,simTime,runSpeed,autoGenerate,autoNext,autoScenario,runway:rwyHdg(),departureHeading:departureHeading(),arrivalRadial:arrivalRadial(),arrivalDistance:arrivalDistanceNm(),manualHeight:manualHeightFt(),callsText:calls.textContent,updatedAt:Date.now()}}
function applyNetState(state){if(!state||receivingRemote)return;receivingRemote=true;const oldSelected=selectedAircraftId;if(syncMode==='trainee'){aircraft.forEach(ac=>{if(ac.labelOffset)traineeLabelOffsets[ac.id]=ac.labelOffset})}aircraft=(state.aircraft||[]).map(aircraftFromNet);if(syncMode==='trainee'){aircraft.forEach(ac=>{if(traineeLabelOffsets[ac.id])ac.labelOffset=traineeLabelOffsets[ac.id]});selectedAircraftId=aircraft.some(a=>a.id===oldSelected)?oldSelected:null}else{selectedAircraftId=aircraft.some(a=>a.id===oldSelected)?oldSelected:null}running=!!state.running;simTime=Number(state.simTime)||0;runSpeed=Number(state.runSpeed)||runSpeed;autoGenerate=!!state.autoGenerate;autoNext=Number(state.autoNext)||autoNext;autoScenario=state.autoScenario||autoScenario;if(state.runway!=null)document.getElementById('runwaySelect').value=String(state.runway);if(state.departureHeading!=null)document.getElementById('arrivalRadialInput').value=String(state.departureHeading).padStart(3,'0');if(state.arrivalDistance!=null)document.getElementById('arrivalDistanceInput').value=String(state.arrivalDistance);if(state.manualHeight!=null&&document.getElementById('manualHeightInput'))document.getElementById('manualHeightInput').value=String(state.manualHeight);if(state.autoScenario!=null&&document.getElementById('autoScenarioSelect'))document.getElementById('autoScenarioSelect').value=String(state.autoScenario);document.getElementById('speedValue').textContent=runSpeed.toFixed(2)+'×';if(typeof state.callsText==='string')calls.textContent=state.callsText;updateRuntimeClock();updateAutoButton();updateTransportButtons();renderList();receivingRemote=false}
function publishState(force=false){if(syncMode!=='instructor'||!syncRef||receivingRemote)return;const now=performance.now();if(!force&&now-lastSyncWrite<250)return;lastSyncWrite=now;syncRef.child('state').set(currentNetState()).catch(err=>updateSyncStatus('Sync error',''))}
function publishNotice(text){if(!syncRef||!text)return;syncRef.child('notice').set({text,by:syncClientId,at:Date.now(),mode:syncMode}).catch(()=>{})}
function listenForNotices(){if(!syncRef)return;noticeUnsub=syncRef.child('notice').on('value',snap=>{const n=snap.val();if(!n||n.by===syncClientId||!n.at||n.at<=lastNoticeAt)return;lastNoticeAt=n.at;updateSyncStatus(n.text,syncMode==='trainee'?'watch':'live');log(n.text);setTimeout(()=>{if(syncMode==='instructor')updateSyncStatus('Host '+syncSession,'live');else if(syncMode==='trainee')updateSyncStatus('Watch '+syncSession,'watch')},3500)},()=>{})}
function traineeLink(){const id=cleanSessionId(document.getElementById('syncSessionInput').value)||syncSession||makeSessionId();document.getElementById('syncSessionInput').value=id;const url=new URL(location.href);url.searchParams.set('mode','trainee');url.searchParams.set('session',id);return url.toString()}
async function copyTraineeLink(){const link=traineeLink();try{await navigator.clipboard.writeText(link);alert('Share link copied. Send this to your friend:\n\n'+link)}catch(_){prompt('Copy this share link:',link)}}
function leaveSession(silent=false){
  if(syncRef&&!silent&&syncMode!=='local')publishNotice((syncMode==='instructor'?'Host':'Trainee')+' left the session.');
  if(stateUnsub&&syncRef){syncRef.child('state').off('value',stateUnsub);stateUnsub=null}
  if(noticeUnsub&&syncRef){syncRef.child('notice').off('value',noticeUnsub);noticeUnsub=null}
  syncRef=null;syncMode='local';syncSession='';document.getElementById('syncSessionInput').value='';running=false;
  try{const url=new URL(location.href);url.searchParams.delete('mode');url.searchParams.delete('session');history.replaceState(null,'',url.toString())}catch(_){}
  updateSyncStatus('Local','');renderList();updateTransportButtons();
}
function startSession(mode,id){if(!ensureFirebase())return;leaveSession(true);syncMode=mode;syncSession=cleanSessionId(id)||makeSessionId();document.getElementById('syncSessionInput').value=syncSession;syncRef=firebaseDb.ref('atcSimSessions/'+syncSession);listenForNotices();if(mode==='instructor'){updateSyncStatus('Host '+syncSession,'live');publishState(true);publishNotice('Host joined the session.');log('Hosting session '+syncSession+'. Use Copy Share Link and send it to your trainee.')}else{updateSyncStatus('Watch '+syncSession,'watch');stateUnsub=syncRef.child('state').on('value',snap=>applyNetState(snap.val()),err=>updateSyncStatus('Sync error',''));publishNotice('Trainee joined the session.')}}
function blockTraineeControl(e){if(syncMode!=='trainee')return;const allowed=e.target.closest&&e.target.closest('#leaveSessionBtn,#scopeWrap,#trafficList,.aircraftRow,#zoomMinus,#zoomPlus,#mobileTabBar,#viewModeBtn');if(!allowed){e.preventDefault();e.stopPropagation()}}
document.addEventListener('click',blockTraineeControl,true);document.addEventListener('pointerdown',blockTraineeControl,true);document.addEventListener('keydown',e=>{if(syncMode==='trainee'&&!(e.target&&e.target.id==='syncSessionInput')){e.preventDefault();e.stopPropagation()}},true);

function updateAutoSettings(){
  if(syncMode==='trainee')return;
  autoScenario=autoScenarioMode();
  updateAutoButton();
  if(autoGenerate)log(`Auto generation: Scenario ${scenarioProfile().label}.`);
}
function updateRuntimeClock(){const total=Math.max(0,Math.floor(simTime));const hh=String(Math.floor(total/3600)).padStart(2,'0'),mm=String(Math.floor((total%3600)/60)).padStart(2,'0'),ss=String(total%60).padStart(2,'0');if(runtimeClock)runtimeClock.textContent=`${hh}:${mm}:${ss}`}function snapshot(){history.push(JSON.stringify({aircraft,simTime}));if(history.length>60)history.shift()}function restore(){if(running)return;const s=history.pop();if(!s)return;const o=JSON.parse(s);aircraft=o.aircraft;simTime=o.simTime;renderList();updateTransportButtons()}function fastForward(sec=10){if(running)return;snapshot();for(let r=sec;r>0;){let dt=Math.min(.2,r);simTime+=dt;updateAircraft(dt);r-=dt}updateRuntimeClock();renderList();updateTransportButtons()}function newScenario(){aircraft=[];history=[];simTime=0;selectedAircraftId=null;autoGenerate=false;autoNext=6;autoScenario="normal";running=true;updateAutoButton();runSpeed=1.5;document.getElementById('speedValue').textContent='1.50×';updateRuntimeClock();calls.textContent='New scenario. Add an arrival or departure.';renderList();updateTransportButtons();if(syncMode==='instructor')publishState(true)}
function tick(t){const dt=Math.min(.2,(t-lastT)/1000);lastT=t;if(running&&syncMode!=='trainee'){simTime+=dt;if(Math.floor(simTime)%10===0&&Math.abs(simTime%10)<dt)snapshot();runAutoGenerate(dt);updateAircraft(dt);updateRuntimeClock();if(!labelDrag&&(t-lastListRender>250)){renderList(false);lastListRender=t}}if(syncMode==='instructor')publishState(false);draw();requestAnimationFrame(tick)}
document.getElementById('pauseBtn').onclick=()=>{if(syncMode==='trainee')return;running=!running;updateTransportButtons();if(syncMode==='instructor')publishState(true)};document.getElementById('newScenarioBtn').onclick=newScenario;document.getElementById('stepBackBtn').onclick=restore;document.getElementById('fastForwardBtn').onclick=()=>fastForward(10);document.getElementById('randomArrivalBtn').onclick=spawnRandomArrival;document.getElementById('spawnDepartureBtn').onclick=spawnRandomDeparture;document.getElementById('autoGenerateBtn').onclick=toggleAutoGenerate;document.getElementById('autoScenarioSelect').onchange=updateAutoSettings;document.getElementById('depHeadingBtn').onclick=spawnDepartureAssignedHeading;document.getElementById('arrivalRadialBtn').onclick=spawnSelectedArrivalOnRadial;document.getElementById('speedMinus').onclick=()=>{runSpeed=Math.max(.25,+(runSpeed-.25).toFixed(2));document.getElementById('speedValue').textContent=runSpeed.toFixed(2)+'×'};document.getElementById('speedPlus').onclick=()=>{runSpeed=Math.min(6,+(runSpeed+.25).toFixed(2));document.getElementById('speedValue').textContent=runSpeed.toFixed(2)+'×'};document.getElementById('zoomMinus').onclick=()=>{const oldC=centre(),oldS=scale();zoomLevel=Math.max(.85,+(zoomLevel-.1).toFixed(2));rescaleAircraftGeometry(oldC,oldS,centre(),scale())};document.getElementById('zoomPlus').onclick=()=>{const oldC=centre(),oldS=scale();zoomLevel=Math.min(2.2,+(zoomLevel+.1).toFixed(2));rescaleAircraftGeometry(oldC,oldS,centre(),scale())};document.getElementById('runwaySelect').onchange=()=>{document.getElementById('arrivalRadialInput').value=String(rwyHdg()).padStart(3,'0');aircraft.forEach(ac=>{if(ac.mode==='arrival-inbound')ac.side=sideFromPosition(ac.pos)});renderList();renderSelectedPanel()};document.getElementById('hostSessionBtn').onclick=()=>startSession('instructor',document.getElementById('syncSessionInput').value);document.getElementById('joinSessionBtn').onclick=()=>startSession('trainee',document.getElementById('syncSessionInput').value);document.getElementById('copyTraineeLinkBtn').onclick=copyTraineeLink;document.getElementById('leaveSessionBtn').onclick=leaveSession;
updateRuntimeClock();updateAutoButton();updateTransportButtons();renderList();document.addEventListener('dragstart', e=>e.preventDefault());
window.addEventListener('beforeunload',()=>{if(syncRef&&syncMode!=='local')publishNotice((syncMode==='instructor'?'Host':'Trainee')+' left the session.')});
const urlParams=new URLSearchParams(location.search);if(urlParams.get('session')){const mode=urlParams.get('mode')==='trainee'?'trainee':'instructor';document.getElementById('syncSessionInput').value=cleanSessionId(urlParams.get('session'));setTimeout(()=>startSession(mode,document.getElementById('syncSessionInput').value),400)}


function preferredPhoneView(){return localStorage.getItem('atcSimPhoneView')||'mobile'}
function isPhoneLayout(){return matchMedia('(max-width: 760px), (pointer: coarse) and (max-width: 900px)').matches}
function applyPhoneViewMode(mode){
  const full=mode==='full';
  document.body.classList.toggle('forceDesktop',full);
  const btn=document.getElementById('viewModeBtn');
  if(btn)btn.textContent=full?'Use Mobile View':'Use Full View';
  if(full){
    document.body.classList.remove('mobile-panel-radar','mobile-panel-aircraft','mobile-panel-selected','mobile-panel-intentions','mobile-panel-session');
  }else if(isPhoneLayout()){
    const active=document.querySelector('#mobileTabBar button.active');
    setMobilePanel(active?.dataset?.panel||'radar');
  }
  setTimeout(()=>{updateMobileHeaderHeight();resize();draw();},80);
}
function togglePhoneViewMode(){
  const next=document.body.classList.contains('forceDesktop')?'mobile':'full';
  localStorage.setItem('atcSimPhoneView',next);
  applyPhoneViewMode(next);
}
function updateMobileHeaderHeight(){
  const h=document.querySelector('header');
  if(h)document.documentElement.style.setProperty('--mobileHeader', Math.ceil(h.getBoundingClientRect().height)+'px');
}
function setMobilePanel(panel){
  ['radar','aircraft','selected','intentions','session'].forEach(p=>document.body.classList.toggle('mobile-panel-'+p,panel===p));
  document.querySelectorAll('#mobileTabBar button').forEach(b=>b.classList.toggle('active',b.dataset.panel===panel));
  hidePopup();
  updateMobileHeaderHeight();
  setTimeout(()=>{resize();draw();},50);
}
document.querySelectorAll('#mobileTabBar button').forEach(btn=>btn.addEventListener('click',()=>setMobilePanel(btn.dataset.panel)));
document.getElementById('viewModeBtn')?.addEventListener('click',togglePhoneViewMode);
window.addEventListener('orientationchange',()=>setTimeout(()=>{updateMobileHeaderHeight();resize();},250));
window.addEventListener('resize',()=>setTimeout(updateMobileHeaderHeight,50));
setTimeout(()=>{updateMobileHeaderHeight(); if(isPhoneLayout())applyPhoneViewMode(preferredPhoneView());},100);
requestAnimationFrame(tick);
</script>
